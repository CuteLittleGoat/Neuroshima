<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuroshima — Kalkulator</title>
  <style>
    :root {
      --bg: #211a16;
      --panel: #161210;
      --panel2: #1d1714;
      --text: #e2d5c4;
      --text2: #bcab96;
      --border: #8e4b2a;
      --accent: #c4602b;
      --shadow: 0 16px 40px rgba(0,0,0,0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 16%, rgba(170, 88, 36, 0.16), transparent 26%),
        radial-gradient(circle at 82% 0%, rgba(107, 117, 71, 0.12), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,0.18), rgba(0,0,0,0.28)),
        var(--bg);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", "Arial Narrow", Arial, sans-serif;
    }

    .construction {
      width: min(920px, 100%);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      border: 2px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      text-align: center;
      padding: clamp(40px, 9vw, 88px) clamp(24px, 4vw, 40px);
    }

    h1 {
      margin: 0;
      font-size: clamp(44px, 9vw, 108px);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 22px rgba(196, 96, 43, 0.22);
      font-family: "Impact", "Arial Black", "Franklin Gothic Heavy", sans-serif;
    }

    p {
      margin: 14px 0 0;
      font-size: clamp(14px, 2vw, 20px);
      color: var(--text2);
    }
  </style>
</head>
<body>
  <section class="construction" aria-label="Informacja o dostępności strony">
    <h1>Strona w budowie</h1>
    <p>Moduł kalkulatora zostanie udostępniony wkrótce.</p>
  </section>
</body>
</html>
